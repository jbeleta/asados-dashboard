<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asado Analytics</title>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background-color: #0f172a;
            color: #e2e8f0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .card {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 0.75rem;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
        }
        .text-gradient {
            background: linear-gradient(to right, #f97316, #ef4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
        .loader {
            border: 4px solid #1e293b;
            border-top: 4px solid #f97316;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SHEET_ID = '1380R_xznLfEkHT7v_JHTXZuR4KET5Oe3nJg6hcHM4Ko';
        const SHEET_NAME = 'Registro';

        // Carga datos del Google Sheet via gviz (no requiere API key, solo sheet público)
        async function fetchSheetData() {
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;
            const res = await fetch(url);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const text = await res.text();

            // La respuesta tiene un wrapper JSONP: /*O_o*/\ngoogle.visualization.Query.setResponse({...});
            const jsonStr = text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1);
            const gviz = JSON.parse(jsonStr);

            if (gviz.status === 'error') throw new Error(gviz.errors?.[0]?.message || 'Error en el sheet');
            if (!gviz.table) throw new Error('No se encontraron datos');

            const cols = gviz.table.cols;
            const headers = cols.map(col => (col.label || col.id).trim());

            return gviz.table.rows
                .filter(row => row && row.c)
                .map(row => {
                    const obj = {};
                    row.c.forEach((cell, i) => {
                        const type = cols[i].type;
                        if (!cell || cell.v === null || cell.v === undefined) {
                            obj[headers[i]] = '';
                        } else if (type === 'number') {
                            obj[headers[i]] = cell.v;           // número crudo para aritmética
                        } else if (type === 'boolean') {
                            obj[headers[i]] = cell.v;           // true/false crudo para asistencia
                        } else if (type === 'date' || type === 'datetime') {
                            obj[headers[i]] = cell.f || '';     // string formateado para display
                        } else {
                            obj[headers[i]] = cell.v !== null ? String(cell.v) : '';
                        }
                    });
                    return obj;
                });
        }

        // --- ICONOS ---
        const IconFire = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-2.246-3.75-2.246-3.75a3.75 3.75 0 1 1 3.75 3.75c0 .324-.04.64-.114.945a.5.5 0 0 0 .848.375 2.5 2.5 0 0 1 3.824-2.825A2.5 2.5 0 0 1 18.5 13.5a2.5 2.5 0 0 1 1.77 4.27 2.5 2.5 0 0 1-3.6 3.6 2.5 2.5 0 1 1-3.536-3.536"/><circle cx="12" cy="12" r="10"/></svg>;
        const IconDollar = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>;
        const IconUsers = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>;
        const IconMeat = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>;

        const StatCard = ({ title, value, subtext, icon, color }) => (
            <div className="card p-6 flex items-start justify-between hover:border-orange-500/50 transition-colors">
                <div>
                    <p className="text-slate-400 text-sm font-medium uppercase tracking-wider">{title}</p>
                    <h3 className="text-3xl font-bold mt-2 text-white">{value}</h3>
                    {subtext && <p className="text-slate-500 text-xs mt-1">{subtext}</p>}
                </div>
                <div className={`p-3 rounded-lg bg-opacity-20 ${
                    color === 'orange' ? 'bg-orange-500 text-orange-500' :
                    color === 'blue'   ? 'bg-blue-500 text-blue-500' :
                    color === 'green'  ? 'bg-green-500 text-green-500' : 'bg-red-500 text-red-500'
                }`}>
                    {icon}
                </div>
            </div>
        );

        const ChartContainer = ({ title, canvasId, heightClass = "h-64" }) => (
            <div className={`card p-6 flex flex-col ${heightClass}`}>
                <h3 className="text-lg font-semibold text-white mb-4 border-b border-slate-700 pb-2">{title}</h3>
                <div className="relative w-full flex-1 min-h-0">
                    <canvas id={canvasId}></canvas>
                </div>
            </div>
        );

        const AsadoApp = () => {
            const [metrics, setMetrics] = useState(null);
            const [error, setError]     = useState(null);
            const chartRefs = useRef({});

            useEffect(() => {
                fetchSheetData()
                    .then(data => processData(data))
                    .catch(err => {
                        console.error(err);
                        setError(err.message);
                    });
            }, []);

            const processData = (rawData) => {
                const validRows = rawData.filter(row => row['Fecha'] && row['Asador']);

                const friendColumns = [
                    "Batu", "Agustín", "Luis", "Juanchi", "Krancho", "Martín",
                    "Eloy", "Fer Vedoya", "Chachi", "Nico", "Santi", "Gabo",
                    "Fer Molina Pico", "Charles", "Zaca", "Nacho", "Rama"
                ];

                const processedAsados = validRows.map(row => {
                    const asistentes = friendColumns.filter(friend => {
                        const val = row[friend];
                        return val === true || val === "TRUE" || val === "VERDADERO";
                    });

                    let cortesClean = [];
                    const colCortes = row['Cortes'];
                    if (colCortes) cortesClean = colCortes.split(',').map(c => c.trim()).filter(Boolean);

                    return {
                        fecha:          row['Fecha'],
                        sede:           row['Sede'],
                        asador:         row['Asador'],
                        kgCarne:        parseFloat(row['Kg Carne (Total)']) || 0,
                        cortes:         cortesClean,
                        gastoPesos:     parseFloat(row['Gasto Comida ($)']) || 0,
                        cotizacionBlue: parseFloat(row['Cotización blue']) || 1,
                        asistentes
                    };
                });

                calculateMetrics(processedAsados, friendColumns);
            };

            const calculateMetrics = (asados, amigos) => {
                const totalAsados = asados.length;
                let totalUSD = 0, totalKg = 0, totalPersonasAcumuladas = 0;

                const attendanceMap = {};
                amigos.forEach(a => attendanceMap[a] = 0);
                const corteStats = {};

                asados.forEach(asado => {
                    const cantAsistentes = asado.asistentes.length;
                    if (cantAsistentes > 0) {
                        totalUSD += (asado.gastoPesos / asado.cotizacionBlue) / cantAsistentes;
                    }
                    totalKg += asado.kgCarne;
                    totalPersonasAcumuladas += cantAsistentes;

                    asado.asistentes.forEach(persona => {
                        if (attendanceMap[persona] !== undefined) attendanceMap[persona]++;
                    });

                    asado.cortes.forEach(corte => {
                        if (corte) corteStats[corte] = (corteStats[corte] || 0) + 1;
                    });
                });

                setMetrics({
                    totalAsados,
                    avgUSD:          totalAsados > 0 ? (totalUSD / totalAsados).toFixed(2) : 0,
                    totalKg:         totalKg.toFixed(1),
                    avgKgPerPerson:  totalPersonasAcumuladas > 0 ? (totalKg / totalPersonasAcumuladas).toFixed(3) : 0,
                    attendanceMap,
                    corteStats,
                    asados
                });
            };

            useEffect(() => {
                if (!metrics) return;
                setTimeout(() => renderCharts(metrics), 100);
            }, [metrics]);

            const renderCharts = (data) => {
                // 1. Asistencia
                const ctx1 = document.getElementById('attendanceChart');
                if (ctx1) {
                    if (chartRefs.current.attendance) chartRefs.current.attendance.destroy();
                    const sorted = Object.entries(data.attendanceMap).sort((a, b) => b[1] - a[1]);
                    const vals = sorted.map(([, v]) => data.totalAsados > 0 ? Math.round((v / data.totalAsados) * 100) : 0);
                    chartRefs.current.attendance = new Chart(ctx1, {
                        type: 'bar',
                        data: {
                            labels: sorted.map(([k]) => k),
                            datasets: [{
                                label: '%',
                                data: vals,
                                backgroundColor: vals.map(v => v < 50 ? '#ef4444aa' : '#22c55eaa'),
                                borderColor:     vals.map(v => v < 50 ? '#ef4444'   : '#22c55e'),
                                borderWidth: 1
                            }]
                        },
                        options: {
                            indexAxis: 'y',
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: { legend: { display: false } },
                            scales: {
                                x: { max: 100, grid: { color: '#334155' }, ticks: { color: '#94a3b8' } },
                                y: { grid: { display: false }, ticks: { color: '#e2e8f0', font: { size: 11 } } }
                            }
                        }
                    });
                }

                // 2. Cortes
                const ctx2 = document.getElementById('cortesChart');
                if (ctx2) {
                    if (chartRefs.current.cortes) chartRefs.current.cortes.destroy();
                    chartRefs.current.cortes = new Chart(ctx2, {
                        type: 'doughnut',
                        data: {
                            labels: Object.keys(data.corteStats),
                            datasets: [{
                                data: Object.values(data.corteStats),
                                backgroundColor: ['#f97316','#eab308','#ef4444','#8b5cf6','#3b82f6','#06b6d4','#10b981'],
                                borderWidth: 0
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: { legend: { position: 'right', labels: { color: '#e2e8f0', boxWidth: 12 } } }
                        }
                    });
                }

                // 3. Evolución del costo
                const ctx3 = document.getElementById('evolutionChart');
                if (ctx3) {
                    if (chartRefs.current.evolution) chartRefs.current.evolution.destroy();
                    const costs = data.asados.map(a =>
                        a.asistentes.length > 0 ? Math.round(a.gastoPesos / a.asistentes.length) : 0
                    );
                    chartRefs.current.evolution = new Chart(ctx3, {
                        type: 'line',
                        data: {
                            labels: data.asados.map(a => a.fecha),
                            datasets: [{
                                label: 'Costo por Persona (ARS)',
                                data: costs,
                                borderColor: '#3b82f6',
                                backgroundColor: '#3b82f622',
                                fill: true,
                                tension: 0.3,
                                pointRadius: 4,
                                pointHoverRadius: 6
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            scales: {
                                y: { grid: { color: '#334155' }, ticks: { color: '#94a3b8' } },
                                x: { ticks: { color: '#e2e8f0' } }
                            }
                        }
                    });
                }
            };

            if (error) return (
                <div className="min-h-screen flex flex-col items-center justify-center bg-slate-900 gap-3 px-4 text-center">
                    <span className="text-5xl">🔥</span>
                    <p className="text-red-400 text-xl font-semibold">No se pudo cargar el dashboard</p>
                    <p className="text-slate-400 text-sm font-mono bg-slate-800 px-4 py-2 rounded">{error}</p>
                    <p className="text-slate-500 text-xs mt-2 max-w-md">
                        Asegurate de que el Google Sheet esté configurado como<br/>
                        <strong className="text-slate-400">"Cualquier persona con el link puede ver"</strong>
                    </p>
                </div>
            );

            if (!metrics) return (
                <div className="min-h-screen flex flex-col items-center justify-center bg-slate-900">
                    <div className="loader mb-4"></div>
                    <p className="text-slate-400 animate-pulse">Consultando la base de datos...</p>
                </div>
            );

            return (
                <div className="min-h-screen pb-10">
                    <header className="bg-slate-900 border-b border-slate-800 sticky top-0 z-50 backdrop-blur-md bg-opacity-80">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <span className="text-3xl">🥩</span>
                                <div>
                                    <h1 className="text-2xl font-bold text-white tracking-tight">Asado <span className="text-gradient">Analytics</span></h1>
                                    <p className="text-xs text-slate-400">La peña de chule</p>
                                </div>
                            </div>
                            <div className="hidden sm:block text-right">
                                <p className="text-sm text-slate-400">Estado</p>
                                <p className="text-green-400 font-mono text-xs">● ACTUALIZADO</p>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 space-y-8">

                        {/* KPIs */}
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                            <StatCard title="Total Asados"      value={metrics.totalAsados}            icon={<IconFire />}   color="orange" />
                            <StatCard title="Costo Promedio"    value={`USD ${metrics.avgUSD}`}        subtext="Por persona"               icon={<IconDollar />} color="green" />
                            <StatCard title="Tonelaje Histórico" value={`${metrics.totalKg} kg`}       subtext="Carne consumida en total"  icon={<IconMeat />}   color="red" />
                            <StatCard title="Índice de Gula"    value={`${metrics.avgKgPerPerson} kg`} subtext="Carne cruda p/p"           icon={<IconUsers />}  color="blue" />
                        </div>

                        {/* Lealtad y Cortes */}
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            <div className="lg:col-span-2 h-[600px]">
                                <ChartContainer title="🤝 Lealtad (%)" canvasId="attendanceChart" heightClass="h-full" />
                            </div>
                            <div className="h-96 lg:h-[600px]">
                                <ChartContainer title="🥩 Mapa de Cortes" canvasId="cortesChart" heightClass="h-full" />
                            </div>
                        </div>

                        {/* Registro Detallado */}
                        <div className="card overflow-hidden">
                            <div className="px-6 py-4 border-b border-slate-700 bg-slate-800/50">
                                <h3 className="text-lg font-semibold text-white">Registro Detallado</h3>
                            </div>
                            <div className="overflow-x-auto">
                                <table className="w-full text-sm text-left text-slate-400">
                                    <thead className="text-xs text-slate-300 uppercase bg-slate-800">
                                        <tr>
                                            <th className="px-6 py-3">Fecha</th>
                                            <th className="px-6 py-3">Asador</th>
                                            <th className="px-6 py-3">Sede</th>
                                            <th className="px-6 py-3">Cortes</th>
                                            <th className="px-6 py-3 text-right">Asistentes</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {metrics.asados.slice().reverse().map((row, idx) => (
                                            <tr key={idx} className="border-b border-slate-700 hover:bg-slate-700/50 transition-colors">
                                                <td className="px-6 py-4 font-medium text-white">{row.fecha}</td>
                                                <td className="px-6 py-4 text-orange-400 font-semibold">{row.asador}</td>
                                                <td className="px-6 py-4">{row.sede}</td>
                                                <td className="px-6 py-4">{row.cortes.join(", ")}</td>
                                                <td className="px-6 py-4 text-right font-bold text-white">{row.asistentes.length}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        {/* Evolución del Costo */}
                        <div className="w-full h-96">
                            <ChartContainer title="📈 Evolución del Costo (ARS por Persona)" canvasId="evolutionChart" heightClass="h-full" />
                        </div>

                        <footer className="text-center text-slate-500 text-sm pt-8">
                            <p>Desarrollado con React & Chart.js • Datos en tiempo real desde Google Sheets</p>
                        </footer>
                    </main>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<AsadoApp />);
    </script>
</body>
</html>
